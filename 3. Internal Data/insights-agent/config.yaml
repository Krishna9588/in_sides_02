stage0:
  supported_audio_formats: ['.mp3', '.m4a', '.wav']
  whisper_model: 'openai/whisper-small'  # Free, lightweight

stage1:
  speaker_identification_confidence: 0.95
  overlap_detection: true
  timestamp_format_patterns:
    - '(\d{1,2}):(\d{2}):(\d{2})'  # HH:MM:SS
    - '(\d{1,2}):(\d{2})'           # MM:SS

stage2:
  classification_model: 'facebook/bart-large-mnli'
  entity_extraction_models:
    - 'spacy'
    - 'hugging_face'
  sentiment_model: 'distilbert-base-uncased-finetuned-sst-2-english'
  min_segment_length: 50  # characters

output:
  formats: ['json', 'markdown', 'raw']
  save_directory: './outputs'
  include_raw_backup: true

logging:
  level: 'INFO'
  file: './logs/agent1.log'